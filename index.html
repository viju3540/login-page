<!DOCTYPE html>
<html>

<head>
    <title>Login Page</title>

    <style>

        body{
            background-color: lightblue;
            font-family: Arial;
        }

        .login-box{
            width: 300px;
            background-color: white;
            padding: 30px;
            margin: 100px auto;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px gray;
        }

        h1{
            color: darkblue;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button{
            background-color: darkblue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: blue;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>Login</h1>

        <input type="text" placeholder="Enter Username">

        <input type="password" placeholder="Enter Password">

        <button>Login</button>

    </div>

</body>

</html>
